version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "Umbraco.Cms"
        update-types: ["version-update:semver-major"]
      - dependency-name: "Umbraco.Cms.*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "Umbraco.TheStarterKit"
        update-types: ["version-update:semver-major"]
